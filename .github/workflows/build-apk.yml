name: 🔨 Build APK Kasir Pro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradlew if Missing
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x ./gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 --decode debug.keystore.base64 > debug.keystore
            echo "Keystore decoded to root"
          fi

      - name: Create .env file
        run: |
          if [ ! -f ".env" ] && [ -f ".env.example" ]; then
            cp .env.example .env
          elif [ ! -f ".env" ]; then
            touch .env
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Xmx4g -Djava.awt.headless=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KasirPro-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
